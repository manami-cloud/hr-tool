<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MC HR Tool — Monochrome</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f4f0;
    --surface: #ffffff;
    --surface2: #f0efe9;
    --border: #e2e0d8;
    --border2: #ccc9be;
    --text: #1a1a1a;
    --text-muted: #888880;
    --text-dim: #555550;
    --accent: #3d6b4f;
    --accent2: #2e5440;
    --danger: #c0392b;
    --warn: #d68910;
    --pass: #27ae60;
    --mono: 'DM Mono', monospace;
    --sans: 'Noto Sans JP', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-weight: 300;
    min-height: 100vh;
    font-size: 14px;
  }

  /* Header */
  .header {
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 56px;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 100;
  }

  .logo {
    font-family: var(--mono);
    font-size: 13px;
    letter-spacing: 0.15em;
    color: var(--text-muted);
  }

  .logo span {
    color: var(--accent);
  }

  .header-tag {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.1em;
  }

  /* Nav tabs */
  .nav {
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    display: flex;
    gap: 0;
  }

  .nav-tab {
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.08em;
    padding: 14px 20px;
    cursor: pointer;
    color: var(--text-muted);
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
    user-select: none;
  }

  .nav-tab:hover { color: var(--text-dim); }
  .nav-tab.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }

  /* Main layout */
  .main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 40px 32px;
  }

  .page { display: none; }
  .page.active { display: block; }

  /* Section title */
  .section-title {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-bottom: 24px;
  }

  /* Cards */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 24px;
    margin-bottom: 16px;
  }

  /* Position selector */
  .position-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 10px;
    margin-bottom: 28px;
  }

  .position-card {
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 16px;
    cursor: pointer;
    transition: all 0.15s;
    background: var(--surface);
  }

  .position-card:hover {
    border-color: var(--border2);
    background: var(--surface2);
  }

  .position-card.selected {
    border-color: var(--accent);
    background: rgba(200, 245, 66, 0.05);
  }

  .position-card .pos-name {
    font-size: 13px;
    font-weight: 500;
    margin-bottom: 6px;
    color: var(--text);
  }

  .position-card .pos-comp {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-muted);
  }

  .position-card .pos-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--border2);
    margin-bottom: 12px;
    transition: background 0.15s;
  }

  .position-card.selected .pos-dot { background: var(--accent); }

  /* Input area */
  .input-label {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.1em;
    margin-bottom: 10px;
    display: block;
  }

  textarea {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 2px;
    color: var(--text);
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 300;
    padding: 16px;
    resize: vertical;
    transition: border-color 0.2s;
    line-height: 1.7;
  }

  textarea:focus {
    outline: none;
    border-color: var(--accent);
  }

  textarea::placeholder { color: var(--text-muted); }

  /* File upload */
  .file-zone {
    border: 1px dashed var(--border2);
    border-radius: 2px;
    padding: 28px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    background: var(--surface2);
    margin-bottom: 16px;
    position: relative;
  }

  .file-zone:hover, .file-zone.drag-over {
    border-color: var(--accent);
    background: rgba(200, 245, 66, 0.03);
  }

  .file-zone input[type="file"] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
  }

  .file-zone-text {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-muted);
  }

  .file-zone-text span {
    color: var(--accent);
  }

  .file-info {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--accent);
    margin-top: 8px;
  }

  /* Or divider */
  .or-divider {
    display: flex;
    align-items: center;
    gap: 16px;
    margin: 16px 0;
    color: var(--text-muted);
    font-family: var(--mono);
    font-size: 11px;
  }

  .or-divider::before, .or-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* Button */
  .btn {
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.1em;
    padding: 12px 28px;
    border: none;
    border-radius: 2px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn-primary {
    background: var(--accent);
    color: #0f0f0f;
    font-weight: 500;
  }

  .btn-primary:hover { background: var(--accent2); }
  .btn-primary:disabled {
    background: var(--border2);
    color: var(--text-muted);
    cursor: not-allowed;
  }

  .btn-ghost {
    background: transparent;
    border: 1px solid var(--border2);
    color: var(--text-dim);
  }

  .btn-ghost:hover { border-color: var(--text-muted); color: var(--text); }

  /* API key field */
  .api-input-wrap {
    display: flex;
    gap: 10px;
    margin-bottom: 28px;
  }

  input[type="password"], input[type="text"] {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 2px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    padding: 10px 14px;
    transition: border-color 0.2s;
  }

  input[type="password"]:focus, input[type="text"]:focus {
    outline: none;
    border-color: var(--accent);
  }

  input::placeholder { color: var(--text-muted); }

  /* Result area */
  .result-wrap {
    margin-top: 28px;
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .verdict-bar {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 20px 24px;
    border-radius: 2px;
    margin-bottom: 20px;
    border: 1px solid;
  }

  .verdict-bar.pass {
    background: rgba(74, 222, 128, 0.06);
    border-color: rgba(74, 222, 128, 0.3);
  }

  .verdict-bar.conditional {
    background: rgba(245, 166, 35, 0.06);
    border-color: rgba(245, 166, 35, 0.3);
  }

  .verdict-bar.fail {
    background: rgba(255, 95, 95, 0.06);
    border-color: rgba(255, 95, 95, 0.3);
  }

  .verdict-icon {
    font-size: 20px;
    line-height: 1;
  }

  .verdict-label {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 500;
  }

  .verdict-bar.pass .verdict-label { color: var(--pass); }
  .verdict-bar.conditional .verdict-label { color: var(--warn); }
  .verdict-bar.fail .verdict-label { color: var(--danger); }

  .verdict-sub {
    font-size: 13px;
    color: var(--text-dim);
    margin-left: auto;
    font-family: var(--mono);
    font-size: 11px;
  }

  /* Score bars */
  .score-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 20px;
  }

  .score-item {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 16px;
  }

  .score-name {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-muted);
    margin-bottom: 10px;
    letter-spacing: 0.08em;
  }

  .score-bar-wrap {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    margin-bottom: 8px;
    overflow: hidden;
  }

  .score-bar-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.8s ease;
  }

  .score-val {
    font-family: var(--mono);
    font-size: 18px;
    color: var(--text);
  }

  .score-val span {
    font-size: 11px;
    color: var(--text-muted);
  }

  /* Analysis sections */
  .analysis-section {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 20px;
    margin-bottom: 12px;
  }

  .analysis-title {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.12em;
    color: var(--text-muted);
    margin-bottom: 14px;
    text-transform: uppercase;
  }

  .analysis-body {
    font-size: 13px;
    line-height: 1.8;
    color: var(--text-dim);
  }

  .tag {
    display: inline-block;
    font-family: var(--mono);
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 2px;
    margin: 3px 3px 3px 0;
  }

  .tag-pass { background: rgba(74, 222, 128, 0.1); color: var(--pass); border: 1px solid rgba(74, 222, 128, 0.2); }
  .tag-warn { background: rgba(245, 166, 35, 0.1); color: var(--warn); border: 1px solid rgba(245, 166, 35, 0.2); }
  .tag-fail { background: rgba(255, 95, 95, 0.1); color: var(--danger); border: 1px solid rgba(255, 95, 95, 0.2); }

  /* Loading */
  .loading-wrap {
    display: none;
    padding: 40px;
    text-align: center;
  }

  .loading-wrap.show { display: block; }

  .loader {
    display: inline-block;
    width: 24px;
    height: 24px;
    border: 2px solid var(--border2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-bottom: 16px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-muted);
  }

  /* Error */
  .error-msg {
    background: rgba(255, 95, 95, 0.06);
    border: 1px solid rgba(255, 95, 95, 0.3);
    border-radius: 2px;
    padding: 16px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--danger);
    margin-top: 16px;
    display: none;
  }

  .error-msg.show { display: block; }

  /* Responsive */
  @media (max-width: 600px) {
    .score-grid { grid-template-columns: 1fr; }
    .position-grid { grid-template-columns: 1fr 1fr; }
    .main { padding: 24px 16px; }
  }

  /* Key status indicator */
  .key-status {
    font-family: var(--mono);
    font-size: 11px;
    padding: 6px 12px;
    border-radius: 2px;
    border: 1px solid var(--border);
    color: var(--text-muted);
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }

  .key-status.set {
    color: var(--pass);
    border-color: rgba(74, 222, 128, 0.2);
    background: rgba(74, 222, 128, 0.05);
  }

  .key-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: currentColor;
  }

  .actions-row {
    display: flex;
    gap: 10px;
    align-items: center;
    margin-top: 20px;
    flex-wrap: wrap;
  }

  .char-count {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-muted);
    margin-left: auto;
  }

  /* Gear button */
  .gear-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 2px;
    color: var(--text-muted);
    cursor: pointer;
    padding: 7px 9px;
    display: flex;
    align-items: center;
    transition: all 0.15s;
  }
  .gear-btn:hover { border-color: var(--border2); color: var(--text); }

  /* Popup overlay */
  .popup-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.3);
    z-index: 200;
  }
  .popup-overlay.show { display: block; }

  /* Popup */
  .popup {
    display: none;
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    width: 440px;
    max-width: calc(100vw - 32px);
    z-index: 201;
    box-shadow: 0 8px 32px rgba(0,0,0,0.12);
  }
  .popup.show { display: block; }

  .popup-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 24px;
    border-bottom: 1px solid var(--border);
  }
  .popup-title {
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.1em;
    color: var(--text-muted);
  }
  .popup-close {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 14px;
    padding: 2px 6px;
    border-radius: 2px;
    transition: color 0.15s;
  }
  .popup-close:hover { color: var(--text); }
  .popup-body { padding: 24px; }

  .radio-label {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--text-dim);
    cursor: pointer;
  }
  .radio-label input[type="radio"] {
    accent-color: var(--accent);
    width: 14px;
    height: 14px;
    cursor: pointer;
  }
  .radio-label:hover { color: var(--text); }
</style>
</head>
<body>

<header class="header">
  <div class="logo">MC <span>//</span> HR TOOL</div>
  <div style="display:flex;align-items:center;gap:16px;">
    <div id="key-status-header" class="key-status">
      <div class="key-dot"></div>
      <span id="key-status-text">APIキー未設定</span>
    </div>
    <button class="gear-btn" onclick="openSettings()" title="API設定">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>
  </div>
</header>

<!-- Settings Popup -->
<div class="popup-overlay" id="popup-overlay" onclick="closeSettings()"></div>
<div class="popup" id="settings-popup">
  <div class="popup-header">
    <div class="popup-title">API設定</div>
    <button class="popup-close" onclick="closeSettings()">✕</button>
  </div>
  <div class="popup-body">
    <label class="input-label">Anthropic APIキー</label>
    <div class="api-input-wrap">
      <input type="password" id="api-key" placeholder="sk-ant-api..." />
      <button class="btn btn-primary" onclick="saveKey()">保存</button>
    </div>
    <div id="key-status" class="key-status" style="margin-top:12px;">
      <div class="key-dot"></div>
      未設定
    </div>
    <p style="margin-top:16px;font-size:12px;color:var(--text-muted);line-height:1.7;">
      APIキーは <a href="https://console.anthropic.com" target="_blank" style="color:var(--accent);">console.anthropic.com</a> で取得できます。キーはブラウザ内にのみ保存され、外部に送信されません。
    </p>
  </div>
</div>

<nav class="nav">
  <div class="nav-tab active" onclick="switchTab('screening')">① 書類選考AI</div>
  <div class="nav-tab disabled" onclick="switchTab('debrief')" style="opacity:0.4;cursor:not-allowed;" title="近日公開">② Debrief生成</div>
  <div class="nav-tab" onclick="switchTab('feedback')">③ FB文章生成</div>
</nav>

<main class="main">

  <!-- SCREENING PAGE -->
  <div class="page active" id="page-screening">

    <!-- Step 1: Position -->
    <p class="section-title">STEP 01 — ポジション選択</p>
    <div class="position-grid" id="position-grid"></div>

    <!-- Step 2: Resume -->
    <p class="section-title">STEP 02 — 候補者レジュメ</p>

    <div class="file-zone" id="file-zone">
      <input type="file" id="pdf-input" accept=".pdf" onchange="handleFile(this)" />
      <div class="file-zone-text">
        PDFをドラッグ＆ドロップ、または<span>クリックして選択</span>
      </div>
      <div class="file-info" id="file-info"></div>
    </div>

    <div class="or-divider">または</div>

    <label class="input-label">テキストで貼り付ける</label>
    <textarea id="resume-text" rows="8" placeholder="候補者の職歴・スキルなどを貼り付けてください..."></textarea>

    <div class="actions-row">
      <button class="btn btn-primary" id="screen-btn" onclick="runScreening()">
        書類選考を実行
      </button>
      <button class="btn btn-ghost" onclick="resetForm()">リセット</button>
      <div class="char-count" id="char-count"></div>
    </div>

    <div class="error-msg" id="error-msg"></div>

    <!-- Loading -->
    <div class="loading-wrap" id="loading">
      <div class="loader"></div>
      <div class="loading-text">候補者情報を分析中...</div>
    </div>

    <!-- Result -->
    <div class="result-wrap" id="result" style="display:none;"></div>

  </div>


  <!-- FB PAGE -->
  <div class="page" id="page-feedback">

    <p class="section-title">STEP 01 — 面接FBメモ</p>
    <div class="card">
      <label class="input-label">面接官のラフメモをそのまま貼り付けてください</label>
      <textarea id="fb-memo" rows="7" placeholder="例：コミュニケーションはよかった。技術力はまあまあ。リーダー経験なし。熱意は感じた。ちょっと受け身かも。"></textarea>
    </div>

    <p class="section-title">STEP 02 — 出力設定</p>
    <div class="card" style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
      <div>
        <label class="input-label">FBの種類</label>
        <div style="display:flex;flex-direction:column;gap:8px;margin-top:4px;">
          <label class="radio-label"><input type="radio" name="fb-type" value="pass" checked /> 通過FB</label>
          <label class="radio-label"><input type="radio" name="fb-type" value="reject" /> 見送りFB</label>
          <label class="radio-label"><input type="radio" name="fb-type" value="other" onchange="toggleOtherInput()" /> その他</label>
        </div>
        <input type="text" id="fb-type-other" placeholder="例：日程調整、条件付き通過…" style="width:100%;margin-top:8px;display:none;" />
      </div>

      <div>
        <label class="input-label">出力先</label>
        <div style="display:flex;flex-direction:column;gap:8px;margin-top:4px;">
          <label class="radio-label"><input type="radio" name="fb-dest" value="email" checked /> メール（エージェント宛）</label>
          <label class="radio-label"><input type="radio" name="fb-dest" value="slack" /> Slack（社外向け）</label>
        </div>
      </div>
    </div>

    <div class="actions-row">
      <button class="btn btn-primary" id="fb-btn" onclick="runFeedback()">FB文章を生成</button>
      <button class="btn btn-ghost" onclick="resetFeedback()">リセット</button>
    </div>

    <div class="error-msg" id="fb-error-msg"></div>

    <div class="loading-wrap" id="fb-loading">
      <div class="loader"></div>
      <div class="loading-text">FB文章を生成中...</div>
    </div>

    <div class="result-wrap" id="fb-result" style="display:none;"></div>

// ============================
// FILE HANDLING
// ============================
async function handleFile(input) {
  const file = input.files[0];
  if (!file) return;

  document.getElementById('file-info').textContent = `${file.name} (${(file.size/1024).toFixed(0)}KB)`;

  // Read as base64 for API
  const reader = new FileReader();
  reader.onload = (e) => {
    pdfText = e.target.result.split(',')[1]; // base64
  };
  reader.readAsDataURL(file);
}

// Drag and drop
const fileZone = document.getElementById('file-zone');
fileZone.addEventListener('dragover', (e) => { e.preventDefault(); fileZone.classList.add('drag-over'); });
fileZone.addEventListener('dragleave', () => fileZone.classList.remove('drag-over'));
fileZone.addEventListener('drop', (e) => {
  e.preventDefault();
  fileZone.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file && file.type === 'application/pdf') {
    document.getElementById('pdf-input').files = e.dataTransfer.files;
    handleFile(document.getElementById('pdf-input'));
  }
});

// ============================
// SCREENING
// ============================
async function runScreening() {
  const key = apiKey || document.getElementById('api-key').value.trim();
  if (!key) { showError('APIキーを入力してください。'); return; }
  if (!selectedPosition) { showError('ポジションを選択してください。'); return; }

  const resumeText = document.getElementById('resume-text').value.trim();
  const hasPdf = pdfText;

  if (!resumeText && !hasPdf) { showError('レジュメを入力またはPDFをアップロードしてください。'); return; }

  const pos = POSITIONS.find(p => p.id === selectedPosition);

  showLoading(true);
  showError('');
  document.getElementById('result').style.display = 'none';

  try {
    let messages;

    if (hasPdf && !resumeText) {
      // PDF mode
      messages = [{
        role: 'user',
        content: [
          {
            type: 'document',
            source: { type: 'base64', media_type: 'application/pdf', data: pdfText }
          },
          {
            type: 'text',
            text: buildPrompt(pos, '[PDFに記載の通り]')
          }
        ]
      }];
    } else {
      messages = [{
        role: 'user',
        content: buildPrompt(pos, resumeText)
      }];
    }

    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': key,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1500,
        system: buildSystem(),
        messages
      })
    });

    if (!response.ok) {
      const err = await response.json();
      throw new Error(err.error?.message || `APIエラー: ${response.status}`);
    }

    const data = await response.json();
    const text = data.content.map(c => c.text || '').join('');
    const parsed = JSON.parse(text.replace(/```json|```/g, '').trim());
    renderResult(parsed, pos);

  } catch (e) {
    showError(e.message);
  } finally {
    showLoading(false);
  }
}

function buildSystem() {
  return `あなたは株式会社モノクローム（Monochrome）のHR担当・大池真奈美さんの書類選考をサポートするAIアシスタントです。
候補者のレジュメとポジション要件・コンピテンシーを照合し、書類選考の判定を行います。

${COMPETENCY_SUMMARY}

必ず以下のJSON形式のみで回答してください。前置きや説明文は不要です。

{
  "verdict": "pass" | "conditional" | "fail",
  "verdict_label": "通過推奨" | "要検討" | "見送り推奨",
  "verdict_reason": "判定理由を1〜2文で",
  "scores": {
    "required_fit": { "score": 0-100, "comment": "必須要件との合致度" },
    "preferred_fit": { "score": 0-100, "comment": "歓迎要件との合致度" },
    "competency_fit": { "score": 0-100, "comment": "モノクロームのコンピテンシーとの合致推定" },
    "overall": { "score": 0-100, "comment": "総合評価" }
  },
  "strengths": ["強み1", "強み2", "強み3"],
  "concerns": ["懸念点1", "懸念点2"],
  "missing_required": ["不足している必須要件（あれば）"],
  "recommendation": "面接官へのコメント。どこを確認すべきか、どんな候補者かを2〜3文で"
}`;
}

function buildHiringCriteria(pos) {
  if (!pos.hiringCriteria) return '';
  const hc = pos.hiringCriteria;
  if (Array.isArray(hc)) {
    return '\n【採用基準（社内規定）】\n' + hc.map((h, i) =>
      `枠${i === 0 ? 'A' : 'B'}:\n・年齢: ${h.ageLimit}\n・経験: ${h.experience}\n・資格: ${h.license}`
    ).join('\n');
  }
  return `\n【採用基準（社内規定）】\n・年齢: ${hc.ageLimit}\n・経験: ${hc.experience}\n・資格: ${hc.license}`;
}

function buildPrompt(pos, resumeText) {
  return `【応募ポジション】
${pos.name}（${pos.nameJa}）
給与レンジ: ${pos.comp}

【ポジション概要】
${pos.context}

【必須要件（MUST）】
${pos.required.map(r => `・${r}`).join('\n')}

【歓迎要件（WANT）】
${pos.preferred.map(r => `・${r}`).join('\n')}
${buildHiringCriteria(pos)}

【候補者レジュメ】
${resumeText}

上記の情報をもとに書類選考の判定を行い、指定のJSON形式で回答してください。採用基準がある場合は年齢・資格要件も考慮してください。`;
}

// ============================
// RENDER RESULT
// ============================
function renderResult(data, pos) {
  const resultEl = document.getElementById('result');

  const verdictClass = data.verdict;
  const icons = { pass: '◎', conditional: '△', fail: '×' };

  const scoreColor = (s) => {
    if (s >= 75) return 'var(--pass)';
    if (s >= 50) return 'var(--warn)';
    return 'var(--danger)';
  };

  const scores = data.scores;

  resultEl.innerHTML = `
    <p class="section-title">選考結果 — ${pos.name}</p>

    <div class="verdict-bar ${verdictClass}">
      <div class="verdict-icon">${icons[data.verdict]}</div>
      <div>
        <div class="verdict-label">${data.verdict_label}</div>
        <div style="font-size:12px;color:var(--text-muted);margin-top:4px;">${data.verdict_reason}</div>
      </div>
      <div class="verdict-sub">総合 ${scores.overall.score}/100</div>
    </div>

    <div class="score-grid">
      ${renderScoreItem('必須要件合致度', scores.required_fit, scoreColor)}
      ${renderScoreItem('歓迎要件合致度', scores.preferred_fit, scoreColor)}
      ${renderScoreItem('コンピテンシー適合', scores.competency_fit, scoreColor)}
      ${renderScoreItem('総合評価', scores.overall, scoreColor)}
    </div>

    <div class="analysis-section">
      <div class="analysis-title">強み</div>
      <div>${data.strengths.map(s => `<span class="tag tag-pass">✓ ${s}</span>`).join('')}</div>
    </div>

    ${data.concerns.length > 0 ? `
    <div class="analysis-section">
      <div class="analysis-title">懸念点</div>
      <div>${data.concerns.map(c => `<span class="tag tag-warn">△ ${c}</span>`).join('')}</div>
    </div>` : ''}

    ${data.missing_required && data.missing_required.length > 0 ? `
    <div class="analysis-section">
      <div class="analysis-title">不足している必須要件</div>
      <div>${data.missing_required.map(m => `<span class="tag tag-fail">✗ ${m}</span>`).join('')}</div>
    </div>` : ''}

    <div class="analysis-section">
      <div class="analysis-title">面接官へのコメント</div>
      <div class="analysis-body">${data.recommendation}</div>
    </div>
  `;

  resultEl.style.display = 'block';
  resultEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function renderScoreItem(label, scoreObj, colorFn) {
  const color = colorFn(scoreObj.score);
  return `
    <div class="score-item">
      <div class="score-name">${label}</div>
      <div class="score-bar-wrap">
        <div class="score-bar-fill" style="width:${scoreObj.score}%;background:${color};"></div>
      </div>
      <div class="score-val">${scoreObj.score}<span>/100</span></div>
      <div style="font-size:11px;color:var(--text-muted);margin-top:6px;">${scoreObj.comment}</div>
    </div>
  `;
}

}

// Init
init();
initFbPositions();

function toggleOtherInput() {
  const isOther = document.querySelector('input[name="fb-type"]:checked').value === 'other';
  const el = document.getElementById('fb-type-other');
  el.style.display = isOther ? 'block' : 'none';
  if (isOther) el.focus();
}
// ============================
// FB GENERATION
// ============================
function initFbPositions() {
  const sel = document.getElementById('fb-position');
  if (!sel) return;
  POSITIONS.forEach(p => {
    const opt = document.createElement('option');
    opt.value = p.id;
    opt.textContent = p.name + '（' + p.nameJa + '）';
    sel.appendChild(opt);
  });
}

async function runFeedback() {
  const key = apiKey || document.getElementById('api-key').value.trim();
  if (!key) { showFbError('APIキーを設定してください（歯車アイコンから）。'); return; }

  const memo = document.getElementById('fb-memo').value.trim();
  const fbType = document.querySelector('input[name="fb-type"]:checked').value;
  const fbTypeOther = document.getElementById('fb-type-other').value.trim();
  const dest = document.querySelector('input[name="fb-dest"]:checked').value;

  if (!memo) { showFbError('面接FBメモを入力してください。'); return; }


  showFbLoading(true);
  showFbError('');
  document.getElementById('fb-result').style.display = 'none';

  const typeLabel = {
    pass: '通過FB（次の選考に進める旨を伝える）',
    reject: '見送りFB（今回は見送りの旨を丁寧に伝える）',
    other: fbTypeOther ? `その他 — 目的：${fbTypeOther}` : 'その他（目的に合わせて文章を作成）'
  }[fbType];
  const destLabel = { email: 'メール（エージェント宛・ビジネスフォーマル・件名あり・署名あり）', slack: 'Slack（社外向け・エージェントや外部担当者宛・簡潔・箇条書き・絵文字なし）' }[dest];

  const prompt = `以下の面接FBメモをもとに、${destLabel}形式で${typeLabel}の文章を作成してください。

【トーン】${toneLabel}
【面接FBメモ（ラフ）】
${memo}

ルール：
- 見送りの場合は「スキル不足」より「現在の採用要件とのマッチング」という表現を優先
- 候補者に敬意を持ったトーンを保つ
- メールの場合：件名・宛名（[エージェント名]）・本文・署名（大池真奈美 / 株式会社モノクローム）を含める。候補者名は[候補者名]のプレースホルダーを使う
- Slackの場合：社外のエージェントや外部担当者宛。3〜6行・体言止め可・絵文字なし。候補者名は[候補者名]のプレースホルダーを使う

${keepOriginal ? '- 面接官のメモの言い回しや表現をなるべくそのまま活かし、整える程度にとどめる' : '- 面接官のラフな言葉はビジネス表現に翻訳する'}

文章のみを出力してください。前置きや説明は不要です。`;

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': key,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 1000,
        messages: [{ role: 'user', content: prompt }]
      })
    });

    if (!response.ok) {
      const err = await response.json();
      throw new Error(err.error?.message || 'APIエラー: ' + response.status);
    }

    const data = await response.json();
    const text = data.content.map(c => c.text || '').join('');
    renderFbResult(text, dest, fbType);

  } catch (e) {
    showFbError(e.message);
  } finally {
    showFbLoading(false);
  }
}

function renderFbResult(text, dest, fbType) {
  const el = document.getElementById('fb-result');
  const destIcon = dest === 'email' ? '✉️' : '💬';
  const destLabel = dest === 'email' ? 'メール' : 'Slack';
  const typeLabel = fbType === 'pass' ? '通過FB' : '見送りFB';

  el.innerHTML = `
    <p class="section-title">生成結果 — ${destLabel} / ${typeLabel}</p>
    <div class="analysis-section" style="position:relative;">
      <div class="analysis-title">${destIcon} ${destLabel}文章</div>
      <div class="analysis-body" id="fb-output" style="white-space:pre-wrap;font-family:var(--sans);line-height:1.9;">${text}</div>
      <button class="btn btn-ghost" onclick="copyFbText()" style="margin-top:16px;font-size:11px;">コピー</button>
    </div>
    <div style="margin-top:10px;font-size:12px;color:var(--text-muted);">修正したい点があれば下のメモを書き換えて再生成できます。</div>
  `;
  el.style.display = 'block';
  el.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function copyFbText() {
  const text = document.getElementById('fb-output').innerText;
  navigator.clipboard.writeText(text).then(() => {
    const btn = event.target;
    btn.textContent = 'コピーしました！';
    setTimeout(() => { btn.textContent = 'コピー'; }, 2000);
  });
}

function showFbLoading(show) {
  document.getElementById('fb-loading').className = show ? 'loading-wrap show' : 'loading-wrap';
  document.getElementById('fb-btn').disabled = show;
}

function showFbError(msg) {
  const el = document.getElementById('fb-error-msg');
  el.textContent = msg;
  el.className = msg ? 'error-msg show' : 'error-msg';
}

function resetFeedback() {
  document.getElementById('fb-memo').value = '';
  document.querySelector('input[name="fb-type"][value="pass"]').checked = true;
  document.getElementById('fb-type-other').style.display = 'none';
  document.getElementById('fb-type-other').value = '';
  document.querySelector('input[name="fb-dest"][value="email"]').checked = true;
  document.getElementById('fb-result').style.display = 'none';
  showFbError('');
}

</script>
</body>
